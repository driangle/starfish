name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            sdks/typescript/package-lock.json
            servers/typescript/package-lock.json
            adapters/p5js/package-lock.json
            tests/integration/package-lock.json
            examples/typescript/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: servers/golang/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: sdks/python/pyproject.toml

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - run: make check
