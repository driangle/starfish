name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      sdk-typescript: ${{ steps.filter.outputs.sdk-typescript }}
      sdk-python: ${{ steps.filter.outputs.sdk-python }}
      server-golang: ${{ steps.filter.outputs.server-golang }}
      server-typescript: ${{ steps.filter.outputs.server-typescript }}
      adapter-p5js: ${{ steps.filter.outputs.adapter-p5js }}
      adapter-threejs: ${{ steps.filter.outputs.adapter-threejs }}
      integration: ${{ steps.filter.outputs.integration }}
      integration-run: ${{ steps.filter.outputs.integration-run }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk-typescript:
              - 'sdks/typescript/**'
            sdk-python:
              - 'sdks/python/**'
            server-golang:
              - 'servers/golang/**'
            server-typescript:
              - 'servers/typescript/**'
            adapter-p5js:
              - 'adapters/p5js/**'
            adapter-threejs:
              - 'adapters/threejs/**'
            integration:
              - 'tests/integration/**'
            # Broad trigger for the integration test matrix: any server, SDK,
            # test harness, or build glue can affect end-to-end behavior.
            integration-run:
              - 'servers/**'
              - 'sdks/**'
              - 'tests/integration/**'
              - 'scripts/run-integration-tests.sh'
              - 'scripts/run-sdk-integration-tests.sh'
              - 'Makefile'
              - '.github/workflows/ci.yml'

  check-sdk-typescript:
    needs: changes
    if: needs.changes.outputs.sdk-typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - run: make lint-sdk-typescript format-check-sdk-typescript check-sdk-typescript

  check-sdk-python:
    needs: changes
    if: needs.changes.outputs.sdk-python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: sdks/python/pyproject.toml

      - run: make check-sdk-python format-check-sdk-python

  check-server-golang:
    needs: changes
    if: needs.changes.outputs.server-golang == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: servers/golang/go.sum

      - run: make lint-golang format-check-golang check-golang

  check-server-typescript:
    needs: changes
    if: needs.changes.outputs.server-typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: servers/typescript/package-lock.json

      - run: make lint-server-typescript check-server-typescript

  check-adapter-p5js:
    needs: changes
    if: needs.changes.outputs.adapter-p5js == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: adapters/p5js/package-lock.json

      - run: make lint-adapters-p5js format-check-adapters-p5js

  check-adapter-threejs:
    needs: changes
    if: needs.changes.outputs.adapter-threejs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: adapters/threejs/package-lock.json

      - name: Install
        run: npm ci
        working-directory: adapters/threejs

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: adapters/threejs

  check-integration:
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/integration/package-lock.json

      - run: make lint-integration check-integration

  # Full integration matrix: every test suite against every server implementation.
  # Each make target self-manages the server lifecycle (build, start, wait, teardown)
  # via scripts/run-integration-tests.sh and scripts/run-sdk-integration-tests.sh.
  integration:
    needs: changes
    if: needs.changes.outputs.integration-run == 'true'
    runs-on: ubuntu-latest
    name: "integration / ${{ matrix.name }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "protocol × go", target: test-golang }
          - { name: "protocol × ts", target: test-typescript }
          - { name: "protocol × python", target: test-python }
          - { name: "ts-sdk × go", target: test-sdk-typescript-golang }
          - { name: "ts-sdk × ts", target: test-sdk-typescript-typescript }
          - { name: "ts-sdk × python", target: test-sdk-typescript-python }
          - { name: "python-sdk × go", target: test-sdk-python-golang }
          - { name: "python-sdk × ts", target: test-sdk-python-typescript }
          - { name: "python-sdk × python", target: test-sdk-python-python }
          - { name: "go-sdk × go", target: test-sdk-golang-golang }
          - { name: "go-sdk × ts", target: test-sdk-golang-typescript }
          - { name: "go-sdk × python", target: test-sdk-golang-python }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/pyproject.toml"

      - name: Run ${{ matrix.name }}
        run: make ${{ matrix.target }}
