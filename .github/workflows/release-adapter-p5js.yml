name: Release Adapter / p5.js

on:
  push:
    tags:
      - "adapters/p5js/v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: adapters/p5js/package-lock.json

      - run: make lint-adapters-p5js format-check-adapters-p5js

  publish:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Build SDK first — adapter depends on it
      - name: Install SDK
        run: npm ci
        working-directory: sdks/typescript

      - name: Build SDK
        run: npm run build
        working-directory: sdks/typescript

      - name: Install
        run: npm ci
        working-directory: adapters/p5js

      - name: Build
        run: npm run build
        working-directory: adapters/p5js

      - name: Publish
        run: npm publish --access public
        working-directory: adapters/p5js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
